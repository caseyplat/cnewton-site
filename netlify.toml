[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Permanent redirect from the retired /blog/ mirror to the canonical Micro.blog site.
[[redirects]]
  from = "/blog"
  to = "https://blog.cnewton.org/"
  status = 301
  force = true

[[redirects]]
  from = "/blog/*"
  to = "https://blog.cnewton.org/"
  status = 301
  force = true
