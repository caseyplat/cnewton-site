[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Temporary redirect while retiring the /blog/ mirror; switch to 301 once tested.
# force = true is required so the still-present blog/index.html does not shadow it.
[[redirects]]
  from = "/blog"
  to = "https://blog.cnewton.org/"
  status = 302
  force = true

[[redirects]]
  from = "/blog/*"
  to = "https://blog.cnewton.org/"
  status = 302
  force = true
